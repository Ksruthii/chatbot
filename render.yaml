




services:
  - type: web
    name: embedbot
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: HUGGINGFACE_API_TOKEN
        sync: false
      - key: HUGGINGFACE_API_URL
        value: https://api-inference.huggingface.co/models/google/flan-t5-base
      - key: BASE_URL
        value: https://your-render-service.onrender.com
      - key: MAX_FREE_BOTS
        value: "1"

